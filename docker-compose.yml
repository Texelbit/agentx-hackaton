services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: sre-agent-backend
    ports:
      - '3000:3000'
    env_file:
      - .env
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard-web/Dockerfile
    container_name: sre-agent-dashboard
    ports:
      - '5174:80'
    depends_on:
      - backend
    restart: unless-stopped

  report:
    build:
      context: .
      dockerfile: apps/report-web/Dockerfile
    container_name: sre-agent-report
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

# Postgres is provided by Supabase (external) — no local DB container needed.
# pgvector must be enabled in Supabase via:
#   CREATE EXTENSION IF NOT EXISTS vector;
#
# The codebase indexed for RAG is NOT mounted from the host. The init script
# (`npm run init`) clones it into a temp folder, indexes it into pgvector and
# deletes it. Run that BEFORE `docker compose up` so the embeddings exist.
